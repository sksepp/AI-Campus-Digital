version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=campus_twin
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-please-change-in-production
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8080
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app   # hot-reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── MongoDB ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: campus-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: campus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Mongo Express (optional DB UI) ──────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: campus-mongo-ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
